# Pre-commit hooks for ProjectKeystone HMAS
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3.12

repos:
  # ============================================================================
  # General File Checks
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # File formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^(k8s/|helm/|\.github/workflows/)'
      - id: check-json
      - id: check-toml
      - id: check-xml

      # File validation
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks

      # Security
      - id: detect-private-key
        exclude: '^(k8s/metrics-security\.yaml|tests/unit/test_grpc_tls\.cpp)$'
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

      # Misc
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: fix-byte-order-marker

  # ============================================================================
  # C++ Code Formatting
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.0
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: [--style=Google]  # Using Google C++ Style Guide

  # ============================================================================
  # CMake Formatting
  # ============================================================================
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        args: [--in-place]
      - id: cmake-lint
        args: [--suppress=C0301, C0103]

  # ============================================================================
  # Markdown Linting
  # ============================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--fix, --config, .markdownlint.yaml]

  # ============================================================================
  # Docker Linting
  # ============================================================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args:
          - --ignore
          - DL3008  # Allow apt without versions
          - --ignore
          - DL3009  # Allow apt without cleanup
          - --ignore
          - DL3015  # Allow apt without --no-install-recommends
          - --ignore
          - DL3003  # Allow cd instead of WORKDIR

  # ============================================================================
  # YAML Linting
  # ============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]

  # ============================================================================
  # CHANGELOG Linting (Keep a Changelog format)
  # ============================================================================
  - repo: local
    hooks:
      - id: changelog-lint
        name: Lint CHANGELOG.md (Keep a Changelog format)
        language: python
        entry: python3 scripts/lint-changelog.py
        args: [CHANGELOG.md]
        files: CHANGELOG\.md
        pass_filenames: false

  # ============================================================================
  # Silent-Failure Guard (ports HomericIntelligence/Odysseus#280)
  # ============================================================================
  - repo: local
    hooks:
      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. See HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '\|\|\s*true(\s*$|\s+#)'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true

      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

  # ============================================================================
  # Git Commit Message Linting (Optional)
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

# ============================================================================
# Configuration Notes
# ============================================================================
#
# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Usage:
#   pre-commit run --all-files  # Run on all files
#   pre-commit run clang-format # Run specific hook
#
# Update hooks:
#   pre-commit autoupdate
#
# Skip hooks:
#   git commit --no-verify  # Skip all hooks (use sparingly)
#   SKIP=clang-format git commit  # Skip specific hook
#
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: keystone
  labels:
    name: keystone
    app: hmas
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: keystone-quota
  namespace: keystone
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
    pods: "50"

name: Extras (non-blocking)

# Benchmarks, NATS integration, and coverage — informational only, not required for merge.
# These jobs produce build artifacts and Codecov reports but do not block PRs.

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: extras-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmarks:
    name: benchmarks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: build/x86.release/_deps
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-release-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies
        run: make deps.native

      - name: Build release
        run: make compile.release.native

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Run benchmarks
        run: make benchmark.native

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: benchmark-results
          path: build/reports/benchmarks/
          retention-days: 30
          if-no-files-found: ignore

  nats-integration:
    name: NATS integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      nats:
        image: nats:latest
        ports:
          - 4222:4222
        # nats:latest is scratch-based (no shell) — health checked by the wait step below

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: build/x86.release/_deps
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-release-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies
        run: make deps.native

      - name: Build release
        run: make compile.release.native

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Wait for NATS to be ready
        run: |
          for i in {1..30}; do
            if nc -z 127.0.0.1 4222; then
              echo "NATS is ready"
              exit 0
            fi
            echo "Waiting for NATS... ($i/30)"
            sleep 1
          done
          echo "NATS failed to start"
          exit 1

      - name: Run NATS integration tests
        env:
          KEYSTONE_INTEGRATION_TESTS: "1"
          NATS_URL: nats://127.0.0.1:4222
        run: ctest --preset release -R "Nats" --output-on-failure

  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps
        with:
          include-coverage: "true"

      - name: Cache Conan packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: build/x86.debug.coverage/_deps
          key: fetchcontent-coverage-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-coverage-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies
        run: make deps.native

      - name: Build with coverage
        run: make compile.debug.coverage.native

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Run tests for coverage
        run: make test.debug.coverage.native

      - name: Generate coverage report
        run: |
          chmod +x scripts/generate_coverage.sh
          BUILD_DIR=build/x86.coverage.debug ./scripts/generate_coverage.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: build/coverage/html/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: build/coverage/coverage_filtered.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

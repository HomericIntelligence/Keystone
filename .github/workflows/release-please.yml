name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build and publish release artifacts when a new release is created.
  # Emits the canonical `release` check-run for the Odysseus ecosystem
  # board (renamed from "Publish Release Artifacts").
  publish:
    name: release
    runs-on: ubuntu-24.04
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Build release
        run: make compile.release.native

      - name: Run tests on release build
        run: make test.release.native

      - name: Build CPack packages
        run: |
          cd build/x86.release
          cpack -G DEB
          cpack -G RPM
          cpack -G TGZ
          cpack -G ZIP

      - name: Upload DEB packages
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: build/x86.release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload RPM packages
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: build/x86.release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload archives
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            build/x86.release/*.tar.gz
            build/x86.release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

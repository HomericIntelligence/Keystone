name: Required Checks

# Canonical status-check umbrella for the org-wide homeric-main-baseline ruleset.
# Each job name is the exact context string registered in the branch protection rule.
# This workflow is intentionally lightweight: it runs fast representative validators
# and defers the full sanitiser matrix to ci.yml.

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: required-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

# ---------------------------------------------------------------------------
# Shared setup fragments (referenced via YAML anchors are not supported by
# GitHub Actions, so common steps are inlined or extracted to the composite
# action already in the repo).
# ---------------------------------------------------------------------------

jobs:
  # ============================================================
  # 1. lint
  # ============================================================
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps
        with:
          include-just: "true"
          install-conan: "false"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python linters
        run: pip install "ruff>=0.1,<1" "mypy>=1.8.0,<2"

      - name: Ruff lint (Python)
        run: ruff check src/ tests/

      - name: Clang-format check (C++)
        run: just format-check

  # ============================================================
  # 2. unit-tests
  # ============================================================
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: build/x86.release/_deps
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-release-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies (native release)
        run: make deps.native

      - name: Build release (C++)
        run: make compile.release.native

      - name: Run C++ tests (release)
        run: make test.release.native

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Python unit tests
        run: python -m pytest tests/ -v --ignore=tests/e2e --ignore=tests/load --ignore=tests/integration -q

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # ============================================================
  # 3. integration-tests
  # ============================================================
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: build/x86.release/_deps
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-release-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies (native release)
        run: make deps.native

      - name: Build release (C++)
        run: make compile.release.native

      - name: Run C++ integration tests (label filter)
        run: |
          cd build/x86.release
          ctest --output-on-failure -L integration || ctest --output-on-failure

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Python integration tests
        run: |
          if [ -d tests/integration ] && [ "$(ls -A tests/integration)" ]; then
            python -m pytest tests/integration/ -v -q
          else
            echo "No Python integration tests found — skipping"
          fi

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # ============================================================
  # 4. security/dependency-scan
  # ============================================================
  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Python dependency audit (pip-audit)
        run: |
          pip install -e ".[dev]" --quiet
          pip-audit --strict || true   # report but don't block on warnings

      - name: Run Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "dep-scan.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
        continue-on-error: true

      - name: Run Trivy filesystem scan (JSON for summary)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "dep-scan.json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('dep-scan.sarif') != ''
        with:
          sarif_file: "dep-scan.sarif"
          category: "dependency-scan-required"

      - name: Build audit summary
        if: always()
        run: |
          if [ ! -f dep-scan.json ]; then
            echo "::warning::Trivy produced no output"
            exit 0
          fi
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' dep-scan.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' dep-scan.json 2>/dev/null || echo "0")
          echo "## Dependency Scan (Required Checks)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |"                >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|"                >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | $CRITICAL |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| High     | $HIGH |"                >> "$GITHUB_STEP_SUMMARY"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::$CRITICAL critical vulnerabilities found"
            exit 1
          fi

  # ============================================================
  # 5. security/secrets-scan
  # ============================================================
  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code (full history for secrets scan)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 6. build
  # ============================================================
  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: build/x86.release/_deps
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-release-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies (native release)
        run: make deps.native

      - name: Build release
        run: make compile.release.native

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # ============================================================
  # 7. typecheck
  # ============================================================
  typecheck:
    name: typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps
        with:
          include-static-analysis: "true"

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: build/x86.debug.clang-tidy/_deps
          key: fetchcontent-debug-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-debug-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies (native debug)
        run: make deps.native

      - name: Configure CMake with clang-tidy
        run: |
          CONAN_TOOLCHAIN=""
          if [ -f build/conan-deps/conan_toolchain.cmake ]; then
            CONAN_TOOLCHAIN="-DCMAKE_TOOLCHAIN_FILE=build/conan-deps/conan_toolchain.cmake"
          fi
          cmake -S . -B build/x86.debug.clang-tidy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_CLANG_TIDY=ON \
            $CONAN_TOOLCHAIN

      - name: Build with clang-tidy (C++ typecheck)
        run: cmake --build build/x86.debug.clang-tidy -j$(nproc) 2>&1 | tee clang-tidy-output.txt
        continue-on-error: true

      - name: Check for clang-tidy errors
        run: |
          if grep -qE "error:" clang-tidy-output.txt; then
            echo "::error::clang-tidy found errors"
            grep -E "error:" clang-tidy-output.txt
            exit 1
          fi
          echo "clang-tidy passed"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Set up Python (mypy)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install mypy and conan stubs
        run: pip install "mypy>=1.8.0,<2" "conan>=2.0.0"

      - name: Run mypy (Python typecheck)
        run: mypy conanfile.py

  # ============================================================
  # 8. schema-validation
  # ============================================================
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub Actions workflow YAML files
        run: |
          find .github/workflows -name "*.yml" | sort | while read -r f; do
            echo "Validating: $f"
            check-jsonschema \
              --schemafile https://json.schemastore.org/github-workflow \
              "$f" && echo "  OK" || { echo "  FAIL"; FAILED=1; }
          done
          [ -z "${FAILED}" ] || exit 1

  # ============================================================
  # 9. deps/version-sync
  # ============================================================
  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cross-check version consistency
        run: |
          python3 - <<'PYEOF'
          import re, sys, pathlib, tomllib

          root = pathlib.Path(".")

          # --- CMakeLists.txt ---
          cmake_text = (root / "CMakeLists.txt").read_text()
          cmake_m = re.search(r"project\s*\([^)]*VERSION\s+([\d.]+)", cmake_text, re.DOTALL)
          cmake_ver = cmake_m.group(1) if cmake_m else None

          # --- conanfile.py ---
          conan_text = (root / "conanfile.py").read_text()
          conan_m = re.search(r'version\s*=\s*["\']([^"\']+)["\']', conan_text)
          conan_ver = conan_m.group(1) if conan_m else None

          # --- pyproject.toml ---
          with open(root / "pyproject.toml", "rb") as fh:
              pyproject = tomllib.load(fh)
          pyproject_ver = pyproject.get("project", {}).get("version")

          # --- pixi.toml ---
          with open(root / "pixi.toml", "rb") as fh:
              pixi = tomllib.load(fh)
          pixi_ver = pixi.get("project", {}).get("version")

          print(f"CMakeLists.txt : {cmake_ver}")
          print(f"conanfile.py   : {conan_ver}")
          print(f"pyproject.toml : {pyproject_ver}")
          print(f"pixi.toml      : {pixi_ver}")

          versions = {
              "CMakeLists.txt": cmake_ver,
              "conanfile.py":   conan_ver,
              "pyproject.toml": pyproject_ver,
              "pixi.toml":      pixi_ver,
          }

          missing = [k for k, v in versions.items() if v is None]
          if missing:
              print(f"::warning::Could not parse version from: {', '.join(missing)}")

          unique = set(v for v in versions.values() if v is not None)
          if len(unique) > 1:
              print("::error::Version mismatch across files!")
              for k, v in versions.items():
                  print(f"  {k}: {v}")
              sys.exit(1)

          print(f"\nAll versions agree: {unique.pop()}")
          PYEOF

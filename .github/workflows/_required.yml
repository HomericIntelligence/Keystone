name: Required Checks

# Canonical required-checks workflow for the homeric-main-baseline ruleset.
# Every job name here is an exact context string in the branch protection ruleset.
# All CI is consolidated here — ci.yml, security-scan.yml, codeql-analysis.yml,
# dependency-audit.yml, and build-and-test.yml are deleted in favour of this file.

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: required-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  # ============================================================
  # 1. lint
  #    clang-format, ruff, pre-commit, CMake cycle check,
  #    cppcheck, clang-tidy, mypy
  # ============================================================
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install build dependencies (just + linters)
        uses: ./.github/actions/install-build-deps
        with:
          include-just: "true"
          install-conan: "false"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python linters
        run: pip install "ruff>=0.1,<1" "mypy>=1.8.0,<2" "conan>=2.0.0"

      - name: Ruff lint (Python)
        run: ruff check src/ tests/

      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
        with:
          extra_args: --show-diff-on-failure

      - name: Check CMake dependency graph for cycles
        run: |
          cmake -S . -B build/graphviz -G Ninja --graphviz=build/graphviz/deps.dot \
            -DCMAKE_BUILD_TYPE=Debug 2>/dev/null || true
          if [ -f build/graphviz/deps.dot ]; then
            python3 << 'EOF'
          import re, sys
          content = open("build/graphviz/deps.dot").read()
          edges = re.findall(r'"([^"]+)" -> "([^"]+)"', content)
          adj = {}
          for src, dst in edges:
              adj.setdefault(src, []).append(dst)
          visited, in_stack = set(), set()
          def has_cycle(node):
              if node in in_stack: return True
              if node in visited: return False
              visited.add(node); in_stack.add(node)
              if any(has_cycle(n) for n in adj.get(node, [])): return True
              in_stack.discard(node); return False
          if any(has_cycle(n) for n in list(adj)):
              print("CYCLE DETECTED in CMake dependency graph!"); sys.exit(1)
          print("No cycles detected in CMake dependency graph")
          EOF
          fi

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --xml \
            --xml-version=2 \
            --suppress=missingIncludeSystem \
            --suppress=syntaxError \
            --inline-suppr \
            -I include \
            src/ tests/ 2> cppcheck-report.xml

      - name: Fail on cppcheck error-severity findings
        run: |
          python3 - << 'EOF'
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse("cppcheck-report.xml")
          errors = [e for e in tree.getroot().find("errors")
                    if e.get("severity") == "error"]
          if errors:
              for e in errors:
                  loc = e.find("location")
                  f = loc.get("file", "?") if loc is not None else "?"
                  l = loc.get("line", "?") if loc is not None else "?"
                  print(f"CPPCHECK ERROR: {e.get('id')} at {f}:{l} — {e.get('msg')}")
              sys.exit(1)
          EOF

      - name: Upload cppcheck results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cppcheck-report
          path: cppcheck-report.xml
          retention-days: 30

      - name: Install build dependencies (with static analysis)
        uses: ./.github/actions/install-build-deps
        with:
          include-static-analysis: "true"

      - name: Cache Conan packages (clang-tidy)
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent (clang-tidy)
        uses: actions/cache@v5
        with:
          path: build/x86.debug.clang-tidy/_deps
          key: fetchcontent-clang-tidy-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-clang-tidy-${{ runner.os }}-

      - name: Install Conan dependencies
        run: make deps.native

      - name: Configure CMake with clang-tidy
        run: |
          CONAN_TOOLCHAIN=""
          if [ -f build/conan-deps/conan_toolchain.cmake ]; then
            CONAN_TOOLCHAIN="-DCMAKE_TOOLCHAIN_FILE=build/conan-deps/conan_toolchain.cmake"
          fi
          cmake -S . -B build/x86.debug.clang-tidy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_CLANG_TIDY=ON \
            $CONAN_TOOLCHAIN

      - name: Build with clang-tidy
        run: cmake --build build/x86.debug.clang-tidy -j$(nproc) 2>&1 | tee clang-tidy-output.txt
        continue-on-error: true

      - name: Fail on clang-tidy errors
        run: |
          # Only fail on errors that reference actual source files (src/ or include/).
          REAL_ERRORS=$(grep -E "error:" clang-tidy-output.txt \
            | grep -v "no input files\|no such file or directory\|unable to handle compilation" \
            || true)
          if [ -n "$REAL_ERRORS" ]; then
            echo "::error::clang-tidy reported errors in source files"
            echo "$REAL_ERRORS"
            exit 1
          fi
          echo "clang-tidy passed"

      - name: Run mypy (Python typecheck)
        run: mypy conanfile.py

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b  # v20.0.0
        with:
          globs: |
            **/*.md
            !.claude/**
            !CHANGELOG.md
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked || {
              echo "::warning::pixi.lock is stale — falling back to unlocked install"
              pixi install
            }
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  # ============================================================
  # 2. unit-tests
  #    C++ unit tests + Python pytest
  # ============================================================
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: build/x86.debug/_deps
          key: fetchcontent-debug-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-debug-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies
        run: make deps.native

      - name: Build debug (C++)
        run: make compile.debug.native

      - name: Run C++ unit tests
        run: |
          cd build/x86.debug
          ctest --output-on-failure -L unit -j$(nproc) || \
          ctest --output-on-failure -E 'integration|sample|example|application' -j$(nproc)

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Python unit tests
        run: pytest tests/ --ignore=tests/e2e --ignore=tests/load --ignore=tests/integration -q
        timeout-minutes: 10

      - name: Upload Python coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload C++ test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-logs
          path: build/x86.debug/Testing/
          retention-days: 7

  # ============================================================
  # 3. integration-tests
  #    C++ integration/sample/example/application tests
  #    + all sanitizer builds (asan, ubsan, tsan, lsan) as matrix
  # ============================================================
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies
        run: make deps.native

      - name: Build + test (ASan)
        run: make compile.debug.asan.native && make test.debug.asan.native

      - name: Build + test (UBSan)
        run: make compile.debug.ubsan.native && make test.debug.ubsan.native

      - name: Build + test (TSan)
        run: make compile.debug.tsan.native && make test.debug.tsan.native
        env:
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tsan.supp:second_deadlock_stack=1"

      - name: Build + test (LSan)
        run: make compile.debug.lsan.native && make test.debug.lsan.native

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-logs
          path: build/x86.debug.*/Testing/
          retention-days: 7

  # ============================================================
  # 4. build
  # ============================================================
  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: build/x86.release/_deps
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-release-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies
        run: make deps.native

      - name: Build release
        run: make compile.release.native

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # ============================================================
  # 5. schema-validation
  # ============================================================
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub Actions workflow YAML files
        run: |
          find .github/workflows -name "*.yml" | sort | while read -r f; do
            echo "Validating: $f"
            check-jsonschema \
              --schemafile https://json.schemastore.org/github-workflow \
              "$f" && echo "  OK" || { echo "  FAIL"; FAILED=1; }
          done
          [ -z "${FAILED}" ] || exit 1

  # ============================================================
  # 7. deps/version-sync
  # ============================================================
  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cross-check version consistency
        run: |
          python3 - <<'PYEOF'
          import re, sys, pathlib, tomllib

          root = pathlib.Path(".")

          cmake_text = (root / "CMakeLists.txt").read_text()
          cmake_m = re.search(r"project\s*\([^)]*VERSION\s+([\d.]+)", cmake_text, re.DOTALL)
          cmake_ver = cmake_m.group(1) if cmake_m else None

          conan_text = (root / "conanfile.py").read_text()
          conan_m = re.search(r'version\s*=\s*["\']([^"\']+)["\']', conan_text)
          conan_ver = conan_m.group(1) if conan_m else None

          with open(root / "pyproject.toml", "rb") as fh:
              pyproject = tomllib.load(fh)
          pyproject_ver = pyproject.get("project", {}).get("version")

          with open(root / "pixi.toml", "rb") as fh:
              pixi = tomllib.load(fh)
          pixi_ver = pixi.get("project", {}).get("version")

          print(f"CMakeLists.txt : {cmake_ver}")
          print(f"conanfile.py   : {conan_ver}")
          print(f"pyproject.toml : {pyproject_ver}")
          print(f"pixi.toml      : {pixi_ver}")

          versions = {
              "CMakeLists.txt": cmake_ver,
              "conanfile.py":   conan_ver,
              "pyproject.toml": pyproject_ver,
              "pixi.toml":      pixi_ver,
          }

          missing = [k for k, v in versions.items() if v is None]
          if missing:
              print(f"::warning::Could not parse version from: {', '.join(missing)}")

          unique = set(v for v in versions.values() if v is not None)
          if len(unique) > 1:
              print("::error::Version mismatch across files!")
              for k, v in versions.items():
                  print(f"  {k}: {v}")
              sys.exit(1)

          print(f"\nAll versions agree: {unique.pop()}")
          PYEOF

  # ============================================================
  # 8. security/dependency-scan
  #    pip-audit + Trivy FS + supply-chain dependency-review
  #    + Docker image scan (Trivy container)
  # ============================================================
  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Python dependency audit (pip-audit)
        run: |
          pip install -e ".[dev]" --quiet
          pip-audit --strict || true

      - name: Run Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "dep-scan.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
        continue-on-error: true

      - name: Run Trivy filesystem scan (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "dep-scan.json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy FS results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('dep-scan.sarif') != ''
        with:
          sarif_file: "dep-scan.sarif"
          category: "trivy-filesystem"

      - name: Supply-chain review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for scanning
        id: docker_build
        run: docker build --target production -t projectkeystone:scan .
        continue-on-error: true

      - name: Warn if Docker build skipped
        if: steps.docker_build.outcome == 'failure'
        run: echo "::warning::Docker build failed — skipping container scan. Fix the Dockerfile to enable Trivy container scanning."

      - name: Run Trivy container scan (SARIF)
        if: steps.docker_build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "projectkeystone:scan"
          format: "sarif"
          output: "container-scan.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
        continue-on-error: true

      - name: Run Trivy container scan (JSON)
        if: steps.docker_build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "projectkeystone:scan"
          format: "json"
          output: "container-scan.json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
        continue-on-error: true

      - name: Upload Trivy container results to Security tab
        if: steps.docker_build.outcome == 'success' && hashFiles('container-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "container-scan.sarif"
          category: "trivy-container"

      - name: Dependency scan summary and gate
        if: always()
        run: |
          echo "## Dependency Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | FS | Container |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|----|-----------|" >> "$GITHUB_STEP_SUMMARY"
          for sev in CRITICAL HIGH MEDIUM LOW; do
            FS_COUNT=0; CTR_COUNT=0
            [ -f dep-scan.json ] && FS_COUNT=$(jq "[.Results[]?.Vulnerabilities[]? | select(.Severity==\"$sev\")] | length" dep-scan.json 2>/dev/null || echo 0)
            [ -f container-scan.json ] && CTR_COUNT=$(jq "[.Results[]?.Vulnerabilities[]? | select(.Severity==\"$sev\")] | length" container-scan.json 2>/dev/null || echo 0)
            echo "| $sev | $FS_COUNT | $CTR_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          done
          CRITICAL_FS=$([ -f dep-scan.json ] && jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' dep-scan.json 2>/dev/null || echo 0)
          CRITICAL_CTR=$([ -f container-scan.json ] && jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' container-scan.json 2>/dev/null || echo 0)
          if [ "$CRITICAL_FS" -gt 0 ] || [ "$CRITICAL_CTR" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found (fs=$CRITICAL_FS container=$CRITICAL_CTR)"
            exit 1
          fi

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-scan-results
          path: |
            dep-scan.sarif
            dep-scan.json
            container-scan.sarif
            container-scan.json
          retention-days: 90
          if-no-files-found: ignore

  # ============================================================
  # 9. security/secrets-scan
  #     gitleaks + Semgrep SAST + CodeQL (c-cpp + python)
  #     + aggregation report gate
  # ============================================================
  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      # ---------- Gitleaks ----------
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          fi
        continue-on-error: true

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

      # ---------- Semgrep SAST ----------
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/docker
        continue-on-error: true

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: "semgrep"

      # ---------- CodeQL C/C++ ----------
      - name: Initialize CodeQL (c-cpp)
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality

      - name: Install C++ build deps for CodeQL
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y \
            cmake ninja-build clang-18 clang++-18 \
            libc++-18-dev libc++abi-18-dev libssl-dev
          pip install conan --break-system-packages
          conan profile detect --force
          conan install . \
            --output-folder=build/conan-deps \
            --lockfile=conan.lock \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=20

      - name: Build for CodeQL (c-cpp)
        continue-on-error: true
        run: |
          cmake -S . -B build/codeql \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-deps/conan_toolchain.cmake
          cmake --build build/codeql

      - name: Perform CodeQL Analysis (c-cpp)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"

      # ---------- CodeQL Python ----------
      - name: Initialize CodeQL (python)
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL Analysis (python)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

      # ---------- Report gate ----------
      - name: Security findings gate
        if: always()
        run: |
          SECRETS_FAIL=0
          if [ -f gitleaks.sarif ]; then
            COUNT=$(jq '[.runs[].results[]] | length' gitleaks.sarif 2>/dev/null || echo -1)
            if [ "$COUNT" -gt 0 ]; then
              echo "::error::Gitleaks found $COUNT potential secret(s)"
              SECRETS_FAIL=1
            fi
          fi
          if [ "$SECRETS_FAIL" -gt 0 ]; then
            exit 1
          fi
          echo "Secret scan passed"

  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps
        with:
          include-coverage: "true"

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: build/x86.debug.coverage/_deps
          key: fetchcontent-coverage-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-coverage-${{ runner.os }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install Conan dependencies
        run: make deps.native

      - name: Build with coverage
        run: make compile.debug.coverage.native

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Run tests for coverage
        run: make test.debug.coverage.native

      - name: Generate coverage report
        run: |
          chmod +x scripts/generate_coverage.sh
          BUILD_DIR=build/x86.coverage.debug ./scripts/generate_coverage.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/coverage/html/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: build/coverage/coverage_filtered.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

name: Install Build Dependencies
description: Install C++20 build tools (clang-18, cmake, ninja) for ProjectKeystone

inputs:
  include-coverage:
    description: Include lcov for coverage builds
    required: false
    default: 'false'
  include-just:
    description: Install the just command runner
    required: false
    default: 'false'
  include-static-analysis:
    description: Include clang-tidy and cppcheck
    required: false
    default: 'false'
  install-conan:
    description: Install Conan 2 and detect compiler profile
    required: false
    default: 'true'
  cache-conan:
    description: Cache ~/.conan2 using actions/cache
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Update apt
      run: sudo apt-get update
      shell: bash

    - name: Install core C++20 build tools
      run: |
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          clang-18 \
          clang++-18 \
          clang-format-18 \
          libc++-18-dev \
          libc++abi-18-dev
      shell: bash

    - name: Install Conan
      if: inputs.install-conan == 'true'
      run: |
        pip install conan
        conan profile detect --force
      shell: bash

    - name: Cache Conan packages
      if: inputs.cache-conan == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.conan2
        key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
        restore-keys: |
          conan-${{ runner.os }}-

    - name: Install coverage tools
      if: inputs.include-coverage == 'true'
      run: sudo apt-get install -y lcov bc
      shell: bash

    - name: Install static analysis tools
      if: inputs.include-static-analysis == 'true'
      run: sudo apt-get install -y clang-tidy-18 cppcheck
      shell: bash

    - name: Install just
      if: inputs.include-just == 'true'
      # Use the pinned setup-just action instead of piping just.systems/install.sh
      # into bash: the install script's unauthenticated GitHub release download
      # intermittently returns HTTP 403 on CI runners, which turned main red on
      # the required `lint` job. setup-just downloads via the Actions toolkit
      # (authenticated, cached) and is already the canonical pattern used in
      # _required.yml.
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

    - name: Set up compiler alternatives
      run: |
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
        sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100
        sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-18 100
        sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-18 100
      shell: bash

    - name: Set up clang-tidy alternatives
      if: inputs.include-static-analysis == 'true'
      run: |
        sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100
      shell: bash

    - name: Install Podman and docker-compose
      run: |
        # shellcheck source=/dev/null
        source "${GITHUB_ACTION_PATH}/podman-version.env"
        sudo apt-get install -y "podman=${PODMAN_APT_VERSION}" podman-compose
      shell: bash

    - name: Start Podman rootless socket
      run: |
        systemctl --user start podman.socket
        echo "DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock" >> "$GITHUB_ENV"
      shell: bash

    - name: Set container build environment
      run: |
        echo "GIT_COMMIT=${{ github.sha }}" >> "$GITHUB_ENV"
        echo "BUILD_UID=$(id -u)" >> "$GITHUB_ENV"
        echo "BUILD_GID=$(id -g)" >> "$GITHUB_ENV"
      shell: bash

    - name: Fix workspace permissions for Podman bind mounts
      run: chmod -R a+rwX .
      shell: bash

    - name: Restore dev container image cache
      id: image_cache
      uses: actions/cache@v5
      with:
        path: /tmp/dev-image.tar
        key: podman-${{ hashFiles('Containerfile', 'docker-compose.yml', 'conanfile.py') }}
        restore-keys: |
          podman-

    - name: Load or build dev container image
      run: |
        if [ "${{ steps.image_cache.outputs.cache-hit }}" = "true" ] && podman load -i /tmp/dev-image.tar 2>/dev/null; then
          echo "Loaded dev image from cache"
        else
          DOCKER_HOST="$DOCKER_HOST" podman-compose build dev
          podman save -o /tmp/dev-image.tar projectkeystone-dev:latest
        fi
      shell: bash

    - name: Start dev container
      run: |
        DOCKER_HOST="$DOCKER_HOST" podman-compose up -d dev
      shell: bash

    - name: Wait for dev container readiness
      run: |
        for i in $(seq 1 10); do
          if DOCKER_HOST="$DOCKER_HOST" podman-compose exec -T dev true 2>/dev/null; then
            echo "Container ready"
            exit 0
          fi
          echo "Waiting for container... attempt $i/10"
          sleep 2
        done
        echo "Container failed to become ready" >&2
        DOCKER_HOST="$DOCKER_HOST" podman-compose logs dev >&2
        exit 1
      shell: bash

    - name: Verify Podman works
      run: |
        podman info --format '{{.Host.Security.Rootless}}'
      shell: bash

    - name: Verify installation
      run: |
        echo "Clang version:"
        clang --version
        echo "Clang-format version:"
        clang-format --version
        echo "CMake version:"
        cmake --version
        echo "Ninja version:"
        ninja --version
      shell: bash

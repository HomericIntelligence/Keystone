[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "projectkeystone"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.8.0",
    "conan>=2.0.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
addopts = "--cov=src/keystone --cov-report=term-missing --cov-report=xml"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["src/keystone"]
omit = ["src/keystone/__main__.py"]

[tool.coverage.report]
fail_under = 85
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "@(abc\\.)?abstractmethod",
    "class .*\\(Protocol\\):",
    "\\.\\.\\.\\s*$",
]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
files = ["conanfile.py"]

[[tool.mypy.overrides]]
module = ["conan.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["conanfile"]
disable_error_code = ["attr-defined"]
disallow_subclassing_any = false

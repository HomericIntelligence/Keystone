; Mypy configuration for ProjectKeystone.
;
; Keystone is a pure C++20 transport library and ships no Python package; the
; ONLY Python file in the repo is conanfile.py (the C++ Conan recipe), which is
; type-checked via `pixi run lint` / `mypy conanfile.py`. This config formerly
; lived in [tool.mypy] of pyproject.toml, which was removed when the Python
; orchestration package was extracted to ProjectAgamemnon (ADR-015/ADR-016).
[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
files = conanfile.py

; Conan's package modules ship no type stubs.
[mypy-conan.*]
ignore_missing_imports = True

; Conan uses dynamic attribute access on options/settings; attr-defined is not
; useful here (and ConanFile itself is re-exported dynamically from `conan`).
[mypy-conanfile]
disable_error_code = attr-defined
disallow_subclassing_any = False

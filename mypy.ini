; Mypy configuration for Keystone.
;
; Keystone is a pure C++20 transport library and ships no Python package; the
; ONLY Python file in the repo is conanfile.py (the C++ Conan recipe), which is
; type-checked via `just typecheck` / `uv run mypy conanfile.py`. mypy is pinned
; in pyproject.toml [dependency-groups].dev (uv-managed per Odysseus ADR-018);
; this file keeps the mypy settings out of that build-toolchain manifest.
[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
files = conanfile.py

; Conan's package modules ship no type stubs.
[mypy-conan.*]
ignore_missing_imports = True

; Conan uses dynamic attribute access on options/settings; attr-defined is not
; useful here (and ConanFile itself is re-exported dynamically from `conan`).
[mypy-conanfile]
disable_error_code = attr-defined
disallow_subclassing_any = False

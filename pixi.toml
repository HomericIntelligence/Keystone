[project]
name = "projectkeystone"
version = "0.1.0"
description = "Hierarchical Multi-Agent System in C++20"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
cmake = ">=3.20"
ninja = ">=1.10"
cxx-compiler = "*"
gtest = "*"
pkg-config = "*"
python = ">=3.11,<4"

[pypi-dependencies]
nats-py = ">=2.0,<3"
httpx = ">=0.27,<1"
pydantic = ">=2.0,<3"
pydantic-settings = ">=2.0,<3"
rich = ">=10.0,<15"
python-dotenv = ">=1.0,<2"

[feature.dev.pypi-dependencies]
pytest = ">=7.0,<10"
pytest-asyncio = ">=0.21,<2"
ruff = ">=0.1,<1"
mypy = ">=1.0,<2"

[tasks]
configure = "cmake -G Ninja -B build-native -S . -DENABLE_GRPC=OFF"
build = { cmd = "ninja -C build-native", depends-on = ["configure"] }
test = { cmd = "cd build-native && ctest --output-on-failure", depends-on = ["build"] }
clean = "rm -rf build-native"

[tasks.test-phase1]
cmd = "build-native/basic_delegation_tests"
depends-on = ["build"]

[tasks.test-phase-a]
cmd = "build-native/async_delegation_tests"
depends-on = ["build"]

[tasks.test-all]
cmd = "cd build-native && ctest --output-on-failure"
depends-on = ["build"]

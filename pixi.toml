[project]
name = "projectkeystone"
version = "0.1.0"
description = "Pure C++20 message transport library (NATS bridge, message bus)"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
cmake = ">=3.20"
ninja = ">=1.10"
conan = ">=2.0"
cxx-compiler = "*"
gtest = "*"
pkg-config = "*"
just = ">=1.13"
# python is retained only as the interpreter for conanfile.py (the C++ Conan
# recipe) and for typechecking it with mypy. Keystone ships no Python: the
# orchestration package was extracted to ProjectAgamemnon per ADR-016.
python = ">=3.11,<4"

[feature.dev.pypi-dependencies]
# mypy typechecks conanfile.py only.
mypy = ">=1.0,<2"

[environments]
dev = { features = ["dev"], solve-group = "default" }

[tasks]
conan-install = "conan install . --output-folder=build-native --build=missing"
configure = { cmd = "cmake -G Ninja -B build-native -S . -DENABLE_GRPC=OFF", depends-on = ["conan-install"] }
build = { cmd = "ninja -C build-native", depends-on = ["configure"] }
test = { cmd = "cd build-native && ctest --output-on-failure", depends-on = ["build"] }
clean = "rm -rf build-native"
format = "just format"
format-check = "just format-check"
test-asan = "make test.debug.asan"
test-tsan = "make test.debug.tsan"
test-ubsan = "make test.debug.ubsan"
build-asan = "make compile.debug.asan"
build-tsan = "make compile.debug.tsan"

[tasks.test-all]
cmd = "cd build-native && ctest --output-on-failure"
depends-on = ["build"]

# Typecheck the Conan recipe (conanfile.py is the only Python in the repo's
# build surface).
[tasks.typecheck-py]
cmd = "mypy conanfile.py"
